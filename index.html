<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>缺料看板</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--s1:#0b0e18;--s2:#10141f;--s3:#151b2a;
  --bd:#1c2538;--bd2:#26344d;
  --tx:#a8bdd4;--txd:#3d5270;--txb:#e0eeff;
  --r:#ff4040;--r2:#ff7070;
  --o:#ff8800;--o2:#ffaa44;
  --y:#d4a800;--y2:#ffd040;
  --g:#00cc66;--g2:#44dd88;
  --a:#3d8bfd;--a2:#7ab8ff;
  --p:#8b5cf6;--p2:#b8a0ff;
  --cyan:#00c8f0;
}
html,body{height:100%;font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);overflow:hidden}

/* subtle scanline */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.03),rgba(0,0,0,.03) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:999}

.shell{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── Header ── */
.hd{display:flex;align-items:center;gap:.6rem;padding:.6rem 1rem;background:var(--s1);border-bottom:2px solid var(--bd);flex-shrink:0}
.hd-title{font-size:1rem;font-weight:900;color:var(--txb);letter-spacing:-.02em;flex-shrink:0}
.hd-title em{color:var(--r2);font-style:normal}
.order-select{background:var(--s2);border:1.5px solid var(--a);border-radius:8px;color:var(--a2);font-size:.82rem;font-weight:700;font-family:'JetBrains Mono',monospace;padding:.35rem .7rem;cursor:pointer;outline:none;flex-shrink:0}
.order-select option{background:var(--s1);color:var(--txb)}
.otab{padding:.3rem 1rem;border-radius:8px;border:1.5px solid var(--bd2);background:transparent;color:var(--txd);font-size:.78rem;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .2s;white-space:nowrap;display:inline-flex;align-items:center;gap:.4rem}
.otab:hover{border-color:var(--a2);color:var(--a2)}
.otab.on{background:var(--a);color:#fff;border-color:var(--a);box-shadow:0 0 18px rgba(61,139,253,.25)}
.otab .pill{font-size:.62rem;padding:.08rem .4rem;border-radius:10px;background:rgba(255,255,255,.15)}
.hd-live{display:flex;align-items:center;gap:.4rem;flex-shrink:0;flex-wrap:nowrap}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--txd);flex-shrink:0}
.live-dot.on{background:var(--g);box-shadow:0 0 8px var(--g);animation:pulse 2s infinite}
.live-dot.fetching{background:var(--y2);animation:pulse .4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.live-text{font-size:.7rem;color:var(--txd)}
.cd{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--txd);min-width:28px}
.btn-xs{padding:.28rem .75rem;border-radius:6px;border:1px solid var(--bd2);background:transparent;color:var(--txd);font-size:.68rem;font-family:inherit;cursor:pointer;transition:all .15s}
.btn-xs:hover{border-color:var(--a2);color:var(--a2)}

/* ── Stats ── */
.stats{display:flex;gap:0;border-bottom:2px solid var(--bd);flex-shrink:0}
.sc{flex:1;padding:.6rem 1rem;background:var(--s1);border-right:1px solid var(--bd);text-align:center;position:relative}
.sc:last-child{border-right:none}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc.c-all::before{background:var(--a)}.sc.c-r::before{background:var(--r)}.sc.c-o::before{background:var(--o)}.sc.c-y::before{background:var(--y)}.sc.c-g::before{background:var(--g)}
.sc-n{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:700;line-height:1;margin-bottom:.15rem}
.sc-l{font-size:.68rem;color:var(--txd);text-transform:uppercase;letter-spacing:.06em}

/* ── Table ── */
.tw{flex:1;min-height:0;overflow-y:auto;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tw::-webkit-scrollbar{width:4px}
.tw::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

table{width:100%;border-collapse:collapse;table-layout:fixed;min-width:760px}
col.c-pri{width:110px}
col.c-pn {width:115px}
col.c-mod{width:175px}
col.c-nm {width:180px}
col.c-need{width:58px}
col.c-gap{width:62px}
col.c-tr {width:58px}
col.c-loc{width:110px}
col.c-due{width:155px}
col.c-rep{width:auto}
col.c-sts{width:110px}

thead{position:sticky;top:0;z-index:2}
th{background:var(--s2);color:var(--txd);font-size:.65rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:.6rem 1rem;border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap}
td{padding:.5rem .8rem;border-bottom:1px solid rgba(28,37,56,.8);vertical-align:middle;font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.wrap{white-space:normal;overflow:visible;text-overflow:unset;word-break:break-all}
tbody tr:last-child td{border-bottom:none}

/* row tints */
tr.tP1 td{background:rgba(255,64,64,.06)}
tr.tP2 td{background:rgba(255,136,0,.05)}
tr.tP3 td{background:rgba(212,168,0,.04)}
tr.tOK td{opacity:.4}
tr:hover td{filter:brightness(1.15)}
tr.tP1:hover td{background:rgba(255,64,64,.12)}
tr.tP2:hover td{background:rgba(255,136,0,.1)}
tr.tP3:hover td{background:rgba(212,168,0,.08)}

/* flash on update */
@keyframes rowFlash{0%{background:rgba(0,204,102,.2)!important}100%{}}
tr.flash td{animation:rowFlash 2.5s ease-out}

/* badges */
.bdg{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .7rem;border-radius:20px;font-size:.75rem;font-weight:700;white-space:nowrap}
.bdg-p1{background:rgba(255,64,64,.14);color:var(--r2);border:1px solid rgba(255,64,64,.25)}
.bdg-p2{background:rgba(255,136,0,.12);color:var(--o2);border:1px solid rgba(255,136,0,.22)}
.bdg-p3{background:rgba(212,168,0,.1);color:var(--y2);border:1px solid rgba(212,168,0,.2)}
.bdg-ok{background:rgba(0,204,102,.08);color:var(--g2);border:1px solid rgba(0,204,102,.15)}

/* key data tags */
.due-tag{color:var(--cyan);font-size:.88rem;font-weight:700;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.rep-tag{color:var(--g2);font-size:.88rem;line-height:1.6;word-break:break-word;white-space:normal}
td.col-rep{border-left:1px solid var(--bd2) !important;}
@media(max-width:768px){table{min-width:640px}td{padding:.38rem .5rem;font-size:.78rem}th{font-size:.56rem;padding:.4rem .5rem}.sc-n{font-size:1.4rem}.hd{padding:.45rem .7rem}}
.mono{font-family:'JetBrains Mono',monospace}
.gap-neg{color:var(--r2);font-weight:700;font-family:'JetBrains Mono',monospace;font-size:.85rem}
.gap-pos{color:var(--g2);font-family:'JetBrains Mono',monospace;font-size:.85rem}
.muted{color:var(--txd)}
.sts-tag{display:inline-block;font-size:.72rem;color:var(--txd)}

/* ── Footer ── */
.ft{padding:.35rem 1.5rem;background:var(--s1);border-top:1px solid var(--bd);display:flex;align-items:center;gap:1.2rem;font-size:.65rem;color:var(--txd);flex-shrink:0}
.ft-ts{font-family:'JetBrains Mono',monospace}
.upd-flash{color:var(--g2);font-weight:700;opacity:0;transition:opacity .4s}
.upd-flash.show{opacity:1}

/* ── Setup overlay ── */
.overlay{position:fixed;inset:0;background:rgba(7,9,15,.96);z-index:50;display:flex;align-items:center;justify-content:center}
.setup-box{background:var(--s1);border:1px solid var(--bd2);border-radius:14px;padding:2rem 2.2rem;max-width:500px;width:90%}
.setup-h{font-size:1.15rem;font-weight:900;color:var(--txb);margin-bottom:.3rem}
.setup-sub{font-size:.73rem;color:var(--txd);margin-bottom:1.3rem;line-height:1.7}
.setup-inp{width:100%;background:var(--bg);border:1.5px solid var(--bd2);border-radius:8px;padding:.6rem .9rem;color:var(--txb);font-size:.78rem;font-family:'JetBrains Mono',monospace;margin-bottom:.7rem}
.setup-inp:focus{outline:none;border-color:var(--a)}
.setup-inp::placeholder{color:var(--txd)}
.setup-row{display:flex;align-items:center;gap:.8rem;margin-bottom:1rem;font-size:.72rem;color:var(--txd)}
.setup-btn{width:100%;padding:.7rem;border-radius:8px;border:none;background:linear-gradient(135deg,var(--a),var(--p));color:#fff;font-size:.88rem;font-weight:700;font-family:inherit;cursor:pointer}
.setup-btn:hover{opacity:.88}
</style>
</head>
<body>

<!-- Setup -->
<div class="overlay" id="overlay">
  <div class="setup-box">
    <div class="setup-h">⚡ 缺料即時看板</div>
    <div class="setup-sub">貼上 Apps Script URL，看板將自動從 Google Sheets 抓取最新資料。</div>
    <input class="setup-inp" id="setupUrl" placeholder="https://script.google.com/macros/s/.../exec">
    <div class="setup-row">
      更新間隔
      <input type="range" id="intRange" min="10" max="120" value="30" style="width:110px;accent-color:var(--a)">
      <span id="intLabel" style="font-family:'JetBrains Mono',monospace;color:var(--a2)">30 秒</span>
    </div>
    <button class="setup-btn" onclick="launch()">啟動看板</button>
  </div>
</div>

<!-- Shell -->
<div class="shell" id="shell" style="visibility:hidden">

  <!-- Header -->
  <div class="hd">
    <div class="hd-title">缺料<em>看板</em></div>
    <select class="order-select" id="orderSelect" onchange="switchOrder(this.value)"></select>
    <div class="hd-live">
      <span class="cd" id="cd">—</span>
      <div class="live-dot" id="liveDot"></div>
      <span class="live-text" id="liveText">待機</span>
      <button class="btn-xs" onclick="fetchNow()">立即更新</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="sc c-all"><div class="sc-n" id="sAll" style="color:var(--a2)">—</div><div class="sc-l">總項目</div></div>
    <div class="sc c-r" ><div class="sc-n" id="sP1"  style="color:var(--r2)">—</div><div class="sc-l">🔴 緊急</div></div>
    <div class="sc c-o" ><div class="sc-n" id="sP2"  style="color:var(--o2)">—</div><div class="sc-l">🟠 警告</div></div>
    <div class="sc c-y" ><div class="sc-n" id="sP3"  style="color:var(--y2)">—</div><div class="sc-l">🟡 追蹤</div></div>
    <div class="sc c-g" ><div class="sc-n" id="sOK"  style="color:var(--g2)">—</div><div class="sc-l">✅ 充足</div></div>
  </div>

  <!-- Table -->
  <div class="tw" id="tw">
    <div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--txd);gap:.6rem;font-size:.85rem">
      <div style="width:22px;height:22px;border:2px solid var(--bd2);border-top-color:var(--a);border-radius:50%;animation:pulse .6s linear infinite"></div>
      載入中…
    </div>
  </div>

  <!-- Footer -->
  <div class="ft">
    <span class="mono" id="ftOrder" style="color:var(--a2)"></span>
    <span class="ft-ts" id="ftTs"></span>
    <span class="upd-flash" id="updFlash">✦ 已更新</span>
    <span style="margin-left:auto;opacity:.5">缺料即時看板 · 資料來源 Google Sheets</span>
  </div>

</div>

<script>
var GAS='https://script.google.com/macros/s/AKfycbyI1azLaZYzPdFAX4SnM4YKoUyYfI9rEQBrECxdRGJlLZQevVrQu6Z4DoN-pTrtX9N2/exec', INT=30, cur=null, allData={}, prev={};
var mainTimer=null, cdTimer=null, cdVal=0;
var UK='看板_URL', IK='看板_INT';

// 直接啟動，跳過設定頁
window.addEventListener('DOMContentLoaded',function(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('shell').style.visibility='visible';
  fetchNow();
  mainTimer=setInterval(fetchNow, INT*1000);
  startCd();
});

function launch(){
  var u=document.getElementById('setupUrl').value.trim();
  if(!u.startsWith('https://script.google.com')){alert('請貼上正確的 Apps Script URL');return;}
  GAS=u; INT=parseInt(document.getElementById('intRange').value)||30;
  localStorage.setItem(UK,u); localStorage.setItem(IK,INT);
  document.getElementById('overlay').style.display='none';
  document.getElementById('shell').style.visibility='visible';
  fetchNow();
  mainTimer=setInterval(fetchNow, INT*1000);
  startCd();
}

function setLive(s){
  var d=document.getElementById('liveDot'), t=document.getElementById('liveText');
  d.className='live-dot';
  if(s==='on'){d.classList.add('on');t.textContent='即時同步';t.style.color='var(--g2)';}
  else if(s==='fetch'){d.classList.add('fetching');t.textContent='更新中…';t.style.color='var(--y2)';}
  else{t.textContent='連線失敗';t.style.color='var(--r2)';}
}

function startCd(){cdVal=INT;clearInterval(cdTimer);tick();cdTimer=setInterval(tick,1000);}
function tick(){document.getElementById('cd').textContent=cdVal+'s';if(cdVal>0)cdVal--;}
function resetCd(){cdVal=INT;clearInterval(cdTimer);tick();cdTimer=setInterval(tick,1000);}

function fetchNow(){
  setLive('fetch');
  fetch(GAS+'?action=pullAll')
  .then(function(r){return r.json();})
  .then(function(res){
    if(!res.ok){setLive('err');return;}
    process(res.data||{});
    setLive('on');
    resetCd();
  })
  .catch(function(){setLive('err');});
}

// ── clean date string ──
function cleanDate(s){
  if(!s||s==='—'||s==='-'||s.trim()==='') return '';
  // If it's already a clean date like 2026/04/10 or 2026-04-10
  var m=s.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m) return m[1]+'/'+(m[2].length===1?'0':'')+m[2]+'/'+(m[3].length===1?'0':'')+m[3];
  // Try parsing JS-style date
  try{
    var d=new Date(s);
    if(!isNaN(d.getTime())){
      return d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0');
    }
  }catch(e){}
  return s.substring(0,10);
}

function process(data){
  var orders=Object.keys(data);
  if(!orders.length) return;

  // detect changes
  var changed={};
  orders.forEach(function(oid){
    var n=data[oid], o=prev[oid]||[], om={};
    o.forEach(function(r){om[r.partNo]=r;});
    var list=[];
    n.forEach(function(r){
      var old=om[r.partNo];
      if(old&&(cleanDate(r.dueDate)!==cleanDate(old.dueDate)||r.reply!==old.reply)) list.push(r.partNo);
    });
    if(list.length) changed[oid]=list;
  });

  prev=JSON.parse(JSON.stringify(data));
  allData=data;

  buildTabs(orders,changed);
  if(!cur||!allData[cur]) cur=orders[0];
  renderTable(cur, changed[cur]||[]);
  renderStats(cur);
  renderFooter();

  if(Object.keys(changed).length){
    var f=document.getElementById('updFlash');
    f.classList.add('show');
    setTimeout(function(){f.classList.remove('show');},3000);
  }
}

function buildTabs(orders,changed){
  var sel=document.getElementById('orderSelect');
  var prev=sel.value;
  sel.innerHTML=orders.map(function(oid){
    var rows=allData[oid]||[];
    var short=rows.filter(function(r){return r.gap<0;}).length;
    var bell=changed[oid]?'🔔 ':'';
    var label=bell+oid+(short>0?' (缺'+short+')':' (✓)');
    return '<option value="'+oid+'"'+(oid===cur?' selected':'')+'>'+label+'</option>';
  }).join('');
  if(prev&&orders.indexOf(prev)>=0) sel.value=prev;
}

function switchOrder(oid){
  cur=oid;
  renderTable(oid,[]);
  renderStats(oid);
  renderFooter();
}

var PC={'P1-緊急':'tP1','P2-警告':'tP2','P3-追蹤':'tP3','P-OK':'tOK'};
var BC={'P1-緊急':'bdg-p1','P2-警告':'bdg-p2','P3-追蹤':'bdg-p3','P-OK':'bdg-ok'};

function renderTable(oid, changedParts){
  var rows=allData[oid]||[];
  if(!rows.length){
    document.getElementById('tw').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--txd);font-size:.85rem">無資料</div>';
    return;
  }
  var cs={};changedParts.forEach(function(p){cs[p]=true;});

  var html='<table>'+
    '<colgroup>'+
    '<col class="c-pri"><col class="c-mod"><col class="c-pn"><col class="c-nm"><col class="c-need"><col class="c-gap"><col class="c-tr"><col class="c-loc"><col class="c-due"><col class="c-rep"><col class="c-sts">'+
    '</colgroup>'+
    '<thead><tr>'+
    '<th>優先級</th><th>模組</th><th>料號</th><th>品名</th>'+
    '<th style="text-align:center">需求</th>'+
    '<th style="text-align:center">缺料</th>'+
    '<th style="text-align:center">在途</th>'+
    '<th>所在位置</th>'+
    '<th>採購交期</th>'+
    '<th style="border-left:1px solid var(--bd2)">供應商回復</th>'+
    '<th>狀態</th>'+
    '</tr></thead><tbody>';

  rows.forEach(function(r){
    var rc=PC[r.priority]||'';
    var bc=BC[r.priority]||'bdg-ok';
    var flash=cs[r.partNo]?' flash':'';
    var gap=r.gap<0
      ? '<span class="gap-neg">'+r.gap+'</span>'
      : '<span class="gap-pos">+'+r.gap+'</span>';

    var cd=cleanDate(r.dueDate);
    var dueH=cd
      ? '<span class="due-tag">'+cd+'</span>'
      : '<span class="muted">—</span>';

    var repH=r.reply
      ? '<span class="rep-tag" title="'+r.reply+'">'+r.reply+'</span>'
      : '<span class="muted">—</span>';

    var transit=r.transitQty>0
      ? '<span class="mono" style="color:var(--a2);font-size:.8rem">'+r.transitQty+'</span>'
      : '<span class="muted">—</span>';
    var loc=r.location
      ? '<span style="font-size:.75rem;color:var(--txd)">'+r.location.substring(0,14)+'</span>'
      : '<span class="muted">—</span>';
    var mod=r.module
      ? '<span style="font-size:.72rem;color:var(--txd)">'+r.module.substring(0,16)+'</span>'
      : '<span class="muted">—</span>';

    html+='<tr class="'+rc+flash+'">'+
      '<td><span class="bdg '+bc+'">'+r.priority+'</span></td>'+
      '<td>'+mod+'</td>'+
      '<td class="mono" style="font-size:.82rem">'+r.partNo+'</td>'+
      '<td style="font-size:.85rem" title="'+r.name+'">'+r.name+'</td>'+
      '<td style="text-align:center;color:var(--txb);font-weight:600">'+r.needQty+'</td>'+
      '<td style="text-align:center">'+gap+'</td>'+
      '<td style="text-align:center">'+transit+'</td>'+
      '<td>'+loc+'</td>'+
      '<td class="wrap">'+dueH+'</td>'+
      '<td class="wrap col-rep">'+repH+'</td>'+
      '<td><span class="sts-tag">'+r.status+'</span></td>'+
    '</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('tw').innerHTML=html;
}

function renderStats(oid){
  var r=allData[oid]||[];
  var fn=function(p){return r.filter(function(x){return x.priority===p;}).length;};
  document.getElementById('sAll').textContent=r.length;
  document.getElementById('sP1').textContent=fn('P1-緊急');
  document.getElementById('sP2').textContent=fn('P2-警告');
  document.getElementById('sP3').textContent=fn('P3-追蹤');
  document.getElementById('sOK').textContent=fn('P-OK');
}

function renderFooter(){
  var n=new Date();
  document.getElementById('ftTs').textContent='最後更新：'+n.getFullYear()+'/'+(n.getMonth()+1)+'/'+n.getDate()+' '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
  document.getElementById('ftOrder').textContent=cur||'';
}
</script>
</body>
</html>
